apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-launchpad
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Nisarg-2001-009/devops-launchpad.git
    targetRevision: HEAD
    path: k8s
    directory:
      exclude: argocd-app.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
